<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Ataque - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05080c;
            --s1: #0a0f18;
            --s2: #0f1621;
            --b1: rgba(255,255,255,.06);
            --b2: rgba(255,255,255,.1);
            --t1: #f0f4ff;
            --t2: #8fa3c0;
            --t3: #4a6080;
            --t4: #2a3a50;
            --green: #00e87a;
            --blue: #3b82f6;
            --purple: #a855f7;
            --orange: #f97316;
            --amber: #f59e0b;
            --red: #ef4444;
            --cyan: #06b6d4;
            --r: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--t1);
        }
        .login-container {
            background: var(--s1);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: var(--r);
            padding: 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            overflow: hidden;
        }
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--green), var(--blue) 55%, var(--purple));
        }
        .brand-header {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
            margin-bottom: 6px;
        }
        .logo {
            width: 38px;
            height: 38px;
            flex-shrink: 0;
        }
        .brand-text h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 3px;
            color: var(--t1);
            line-height: 1;
        }
        .brand-text .brandsub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.5rem;
            color: var(--t3);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .subtitle {
            text-align: center;
            color: var(--t3);
            margin-bottom: 28px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 7px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--t2);
        }
        input {
            width: 100%;
            padding: 11px 14px;
            background: var(--s2);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 8px;
            font-size: 0.82rem;
            font-family: 'Outfit', sans-serif;
            color: var(--t1);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input::placeholder {
            color: var(--t4);
        }
        input:focus {
            outline: none;
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: rgba(0, 232, 122, 0.1);
            border: 1px solid rgba(0, 232, 122, 0.4);
            border-radius: 8px;
            font-size: 0.78rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: var(--green);
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-top: 4px;
        }
        .btn-submit:hover {
            background: rgba(0, 232, 122, 0.2);
            box-shadow: 0 4px 20px rgba(0, 232, 122, 0.15);
        }
        .btn-submit:active {
            transform: scale(0.98);
        }
        .error {
            color: var(--red);
            font-size: 0.75rem;
            margin-top: 12px;
            text-align: center;
            font-weight: 600;
        }
        .info {
            background: rgba(59, 130, 246, 0.06);
            border-left: 3px solid var(--blue);
            padding: 10px 14px;
            margin-top: 22px;
            border-radius: 6px;
            font-size: 0.68rem;
            color: var(--t2);
        }
        .footer-links {
            margin-top: 20px;
            text-align: center;
            font-size: 0.7rem;
        }
        .footer-links a {
            color: var(--t3);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .footer-links a:hover {
            color: var(--blue);
        }
        .request-access {
            display: none;
            background: rgba(249, 115, 22, 0.08);
            border-left: 3px solid var(--orange);
            padding: 10px 14px;
            margin-top: 14px;
            border-radius: 6px;
            font-size: 0.72rem;
            color: var(--t2);
            text-align: center;
            animation: fadeIn 0.3s ease;
        }
        .request-access a {
            color: var(--orange);
            font-weight: 700;
            text-decoration: none;
        }
        .request-access a:hover {
            text-decoration: underline;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="brand-header">
            <svg class="logo" viewBox="0 0 36 36" fill="none">
                <rect x="2" y="3" width="32" height="24" rx="6" fill="#0077B6"/>
                <path d="M8 27 L6 33 L14 27" fill="#0077B6"/>
                <text x="18" y="20" text-anchor="middle" font-family="'Outfit',Arial,sans-serif" font-weight="700" font-size="14" fill="#ffffff">px</text>
            </svg>
            <div class="brand-text">
                <h1>MAPA DE ATAQUE</h1>
                <div class="brandsub">Rota do Sucesso &middot; Leodagan</div>
            </div>
        </div>
        <p class="subtitle">Acesso ao Dashboard</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input
                    type="email"
                    id="email"
                    placeholder="seu.email@px.center"
                    autocomplete="email"
                    required
                >
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Digite a senha"
                    autocomplete="off"
                    required
                >
            </div>
            <button type="submit" class="btn-submit">Acessar Dashboard</button>
            <div id="error" class="error"></div>
        </form>

        <div id="requestAccess" class="request-access">
            E-mail nao cadastrado. <a id="requestLink" href="#">Solicitar acesso</a>
        </div>

        <div class="info">
            Acesso restrito aos membros da equipe Leodagan.
        </div>

        <div class="footer-links">
            <a href="mailto:gustavo.souza@px.center?subject=Suporte%20-%20Mapa%20de%20Ataque%20Leodagan">Contato com Suporte</a>
        </div>

        <div style="text-align:center;margin-top:22px;padding-top:16px;border-top:1px solid rgba(255,255,255,.06);">
            <div style="display:inline-flex;align-items:center;gap:8px;opacity:.6;">
                <span style="font-size:.6rem;color:var(--t3);letter-spacing:1px;text-transform:uppercase;font-weight:600;">Powered by</span>
                <svg viewBox="0 0 110 36" fill="none" style="height:22px;">
                    <rect x="2" y="3" width="32" height="24" rx="6" fill="#0077B6"/>
                    <path d="M8 27 L6 33 L14 27" fill="#0077B6"/>
                    <text x="18" y="20" text-anchor="middle" font-family="'Outfit',Arial,sans-serif" font-weight="700" font-size="14" fill="#ffffff">px</text>
                    <text x="42" y="23" font-family="'Outfit',Arial,sans-serif" font-weight="600" font-size="16" fill="var(--t2)">Apoio</text>
                </svg>
            </div>
        </div>
    </div>

    <script>
        const allowedEmails = [
            'joao.palhano@px.center',
            'fabiana.toti@px.center',
            'jeferson.assis@px.center',
            'jordan.alexandre@px.center',
            'leonardo.leao@px.center',
            'renan.ferreira@px.center',
            'gustavo.souza@px.center',
            'gabriel.kegel@px.center',
            'lua.gomes@px.center',
            'jose.bento@px.center'
        ];

        const password = 'leodagan';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const emailInput = document.getElementById('email').value.trim().toLowerCase();
            const senhaInput = document.getElementById('password').value;
            const requestBox = document.getElementById('requestAccess');

            requestBox.style.display = 'none';
            document.getElementById('error').textContent = '';

            if (!allowedEmails.includes(emailInput)) {
                document.getElementById('error').textContent = 'E-mail nao autorizado!';
                requestBox.style.display = 'block';
                const subject = encodeURIComponent('Solicitar Acesso - Mapa de Ataque Leodagan');
                const body = encodeURIComponent('Ola Gustavo,\n\nGostaria de solicitar acesso ao Mapa de Ataque Leodagan.\n\nMeu e-mail: ' + emailInput + '\n\nObrigado!');
                document.getElementById('requestLink').href = 'mailto:gustavo.souza@px.center?subject=' + subject + '&body=' + body;
                document.getElementById('email').focus();
                return;
            }

            if (senhaInput !== password) {
                document.getElementById('error').textContent = 'Senha incorreta!';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
                return;
            }

            sessionStorage.setItem('autenticado', 'true');
            sessionStorage.setItem('usuario', emailInput);
            window.location.href = 'mapa-ataque_graph.html';
        });

        if (sessionStorage.getItem('autenticado') === 'true') {
            window.location.href = 'mapa-ataque_graph.html';
        }
    </script>
</body>
</html>
