<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Ataque - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .error {
            color: #dc3545;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }
        .info {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-top: 20px;
            border-radius: 4px;
            font-size: 12px;
            color: #333;
        }
        .footer-links {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
        }
        .footer-links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
        .footer-links .separator {
            color: #ccc;
            margin: 0 8px;
        }
        .request-access {
            display: none;
            background: #fff3e0;
            border-left: 4px solid #f97316;
            padding: 12px;
            margin-top: 15px;
            border-radius: 4px;
            font-size: 13px;
            color: #333;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }
        .request-access a {
            color: #f97316;
            font-weight: 600;
            text-decoration: none;
        }
        .request-access a:hover {
            text-decoration: underline;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Mapa de Ataque</h1>
        <p class="subtitle">Rota do Sucesso - Leodagan</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail:</label>
                <input
                    type="email"
                    id="email"
                    placeholder="seu.email@px.center"
                    autocomplete="email"
                    required
                >
            </div>
            <div class="form-group">
                <label for="password">Senha:</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Digite a senha"
                    autocomplete="off"
                    required
                >
            </div>
            <button type="submit">Acessar Dashboard</button>
            <div id="error" class="error"></div>
        </form>

        <div id="requestAccess" class="request-access">
            E-mail nao cadastrado. <a id="requestLink" href="#">Solicitar acesso</a>
        </div>

        <div class="info">
            Acesso restrito aos membros da equipe Leodagan.
        </div>

        <div class="footer-links">
            <a href="mailto:gustavo.souza@px.center?subject=Suporte%20-%20Mapa%20de%20Ataque%20Leodagan">Contato com Suporte</a>
        </div>
    </div>

    <script>
        const allowedEmails = [
            'joao.palhano@px.center',
            'fabiana.toti@px.center',
            'jeferson.assis@px.center',
            'jordan.alexandre@px.center',
            'leonardo.leao@px.center',
            'renan.ferreira@px.center',
            'gustavo.souza@px.center'
        ];

        const password = 'leodagan';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const emailInput = document.getElementById('email').value.trim().toLowerCase();
            const senhaInput = document.getElementById('password').value;

            if (!allowedEmails.includes(emailInput)) {
                document.getElementById('error').textContent = 'E-mail nao autorizado!';
                const requestBox = document.getElementById('requestAccess');
                requestBox.style.display = 'block';
                const subject = encodeURIComponent('Solicitar Acesso - Mapa de Ataque Leodagan');
                const body = encodeURIComponent('Ola Gustavo,\n\nGostaria de solicitar acesso ao Mapa de Ataque Leodagan.\n\nMeu e-mail: ' + emailInput + '\n\nObrigado!');
                document.getElementById('requestLink').href = 'mailto:gustavo.souza@px.center?subject=' + subject + '&body=' + body;
                document.getElementById('email').focus();
                return;
            }

            if (senhaInput !== password) {
                document.getElementById('error').textContent = 'Senha incorreta!';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
                return;
            }

            sessionStorage.setItem('autenticado', 'true');
            sessionStorage.setItem('usuario', emailInput);
            window.location.href = 'mapa-ataque_graph.html';
        });

        if (sessionStorage.getItem('autenticado') === 'true') {
            window.location.href = 'mapa-ataque_graph.html';
        }
    </script>
</body>
</html>
